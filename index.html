<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gameboxd - Inicio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Gameboxd</h1>
        <p>Lleva el registro de todo lo que juegas</p>
    </header>

    <main>
        <h2>Catálogo de Juegos</h2>
        
        <div style="text-align: center; margin-bottom: 20px;">
            <input type="text" id="input-busqueda" placeholder="Ej: Super Mario, Zelda..." style="padding: 10px; width: 300px; border-radius: 5px;">
            <button onclick="buscarEnRAWG()" style="padding: 10px 20px; cursor: pointer; background-color: #00e676; border: none; border-radius: 5px; font-weight: bold;">Buscar</button>
        </div>

        <div id="contenedor-juegos" class="grid-juegos">
            <p>Escribe un juego en el buscador para empezar...</p>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
