<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gameboxd - Registro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1><a href="index.html" style="color: white; text-decoration: none;">Gameboxd</a></h1>
    </header>

    <main class="contenedor-centrado">
        <div class="caja-formulario">
            <h2>Crear una cuenta</h2>
            <p>Únete para guardar y puntuar tus juegos favoritos.</p>
            
            <form id="form-registro">
                <div class="grupo-input">
                    <label for="username">Nombre de usuario</label>
                    <input type="text" id="username" placeholder="gamer" required>
                </div>
                
                <div class="grupo-input">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" placeholder="tu@email.com" required>
                </div>
                
                <div class="grupo-input">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Mínimo 6 caracteres" required>
                </div>
                
                <button type="submit" class="btn-principal">Registrarse</button>
            </form>
            
            <p class="enlace-pie">¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a></p>
        </div>
    </main>

    <script src="auth.js"></script>
</body>
</html>
