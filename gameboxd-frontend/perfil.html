<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gameboxd - Mi Perfil</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <header style="display: flex; justify-content: space-between; align-items: center; padding: 20px 40px;">
        <h1 style="margin: 0;"><a href="index.html" style="color: white; text-decoration: none;">Gameboxd</a></h1>
        <div id="zona-usuario">
            <a href="index.html" style="color: #9ab; text-decoration: none; font-weight: bold;">Volver al Buscador</a>
        </div>
    </header>

    <main>
        <div style="text-align: center; margin-bottom: 40px; background-color: #2c3440; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
            <img src="" alt="Avatar" id="avatar-perfil" style="width: 120px; height: 120px; border-radius: 50%; background-color: #14181c; margin-bottom: 15px; border: 3px solid #00e676;">
            <h2 id="nombre-perfil" style="margin: 0; font-size: 32px;">Cargando perfil...</h2>
            <div class="stats-container">
        <div class="stat-item">
            <span class="stat-value" id="stat-total">0</span>
            <span class="stat-label">Juegos</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="stat-year">0</span>
            <span class="stat-label">Este año</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="stat-rating">0.0</span>
            <span class="stat-label">Nota Media</span>
        </div>
        </div>
            <p style="color: #00e676; font-weight: bold; margin-top: 5px;">Juegos recientes</p>
        </div>

        <h3>RECENT GAMES</h3>
        <div id="contenedor-mis-juegos" class="grid-juegos">
            <p>Conectando con la base de datos...</p>
        </div>
    </main>

    <script src="perfil.js"></script>

    <div id="modal-ver-review" class="modal-oculto">
        <div class="contenido-modal">
            <span class="cerrar-modal" onclick="cerrarModalReview()">&times;</span>
            
            <div style="display: flex; gap: 20px; text-align: left; margin-top: 15px;">
                <img id="portada-review" src="" style="width: 150px; height: 225px; object-fit: cover; border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); flex-shrink: 0;">
                
                <div style="flex-grow: 1; min-width: 0;">
                    <h2 id="titulo-review" style="margin-top: 0; margin-bottom: 5px; color: white; overflow-wrap: break-word; word-break: break-word;"></h2>
                    <div id="estrellas-review" style="color: #00e676; font-size: 20px; margin-bottom: 5px;"></div>
                    <p id="fecha-review" style="color: #9ab; font-size: 12px; text-transform: uppercase; margin-bottom: 15px; border-bottom: 1px solid #455a64; padding-bottom: 10px;"></p>
                    
                    <p id="texto-review" style="color: #cbd5e1; line-height: 1.6; font-size: 14px; white-space: pre-wrap; overflow-y: auto; max-height: 200px; overflow-wrap: break-word; word-break: break-word;"></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
